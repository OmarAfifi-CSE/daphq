name: daphq
description: "Cross-platform file transfer app over local Wi-Fi/Hotspot."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  permission_handler: ^12.0.1
  flutter_bloc: ^9.1.1
  flutter_screenutil: ^5.9.3
  window_manager: ^0.5.1
  flutter_foreground_task: ^9.2.2
  path: ^1.9.1
  http: ^1.6.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

